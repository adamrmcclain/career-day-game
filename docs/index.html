<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Career Day Game!</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', Courier, monospace;
      color: white;
      user-select: none;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 12px;
      color: #4ecca3;
      letter-spacing: 2px;
      text-shadow: 0 0 20px #4ecca3aa;
    }

    #gameWrap {
      position: relative;
      width: 100%;
      max-width: 1100px;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: auto;
      border: 3px solid #4ecca3;
      border-radius: 6px;
      box-shadow: 0 0 30px #4ecca355;
      /* Keep pixel art crisp */
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* Touch controls — only shown on touch devices (iPad / phone) */
    #touchControls {
      display: none;
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    @media (pointer: coarse) {
      #touchControls { display: block; }
      h1 { font-size: 1.6rem; }
      #difficulty button { padding: 6px 14px; font-size: 0.85rem; letter-spacing: 1px; }
      #controls { font-size: 0.8rem; }
    }

    .touch-pad, .touch-actions {
      position: absolute;
      bottom: 4%;
      display: flex;
      gap: 14px;
      pointer-events: auto;
    }

    .touch-pad { left: 4%; }
    .touch-actions { right: 4%; }

    .touch-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 3px solid #4ecca3;
      background: rgba(26, 26, 46, 0.55);
      color: #4ecca3;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.95rem;
      font-weight: bold;
      letter-spacing: 1px;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      cursor: pointer;
    }

    .touch-btn.arrow { font-size: 1.8rem; line-height: 1; }

    .touch-btn:active,
    .touch-btn.pressed {
      background: #4ecca3;
      color: #1a1a2e;
    }

    /* Invisible input that overlays the canvas during name entry. Pointer
       events are off by default so dance/jump taps hit the canvas; flipped to
       auto while entering initials so a tap is a real user gesture on the
       input itself — required for iOS Safari to summon the keyboard. */
    #nameInput {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      font-size: 16px;   /* prevents iOS auto-zoom on focus */
      background: transparent;
      border: none;
      color: transparent;
      caret-color: transparent;
      pointer-events: none;
      -webkit-tap-highlight-color: transparent;
    }

    #gameWrap.entering-name #nameInput {
      pointer-events: auto;
      cursor: text;
    }

    #controls {
      margin-top: 12px;
      font-size: 1rem;
      opacity: 0.6;
      letter-spacing: 1px;
    }

    #difficulty {
      display: flex;
      gap: 12px;
      margin-bottom: 14px;
    }

    #difficulty button {
      font-family: 'Courier New', Courier, monospace;
      font-size: 1rem;
      letter-spacing: 2px;
      padding: 8px 22px;
      background: transparent;
      color: #4ecca3;
      border: 2px solid #4ecca3;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    #difficulty button:hover {
      background: #4ecca322;
    }

    #difficulty button.active {
      background: #4ecca3;
      color: #1a1a2e;
    }
  </style>
</head>
<body>
  <h1>Career Day Game!</h1>
  <div id="difficulty">
    <button data-difficulty="easy">EASY</button>
    <button data-difficulty="medium" class="active">MEDIUM</button>
    <button data-difficulty="hard">HARD</button>
  </div>
  <div id="gameWrap">
    <canvas id="gameCanvas" width="1100" height="700"></canvas>
    <div id="touchControls">
      <div class="touch-pad">
        <button class="touch-btn arrow" data-key="ArrowLeft" aria-label="Move left">◀</button>
        <button class="touch-btn arrow" data-key="ArrowRight" aria-label="Move right">▶</button>
      </div>
      <div class="touch-actions">
        <button class="touch-btn" data-key="d" aria-label="Dance">DANCE</button>
        <button class="touch-btn" data-key="w" aria-label="Jump">JUMP</button>
      </div>
    </div>
    <input id="nameInput" type="text" maxlength="3" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" inputmode="text" aria-label="Enter your initials">
  </div>
  <div id="controls">← → move &nbsp;·&nbsp; W jump (tap twice for double jump) &nbsp;·&nbsp; D dance for points!</div>
  <script src="game.js"></script>
</body>
</html>
